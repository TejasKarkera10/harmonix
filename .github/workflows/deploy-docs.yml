name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs dependencies
        run: |
          pip install "mkdocs==1.6.1" "mkdocs-material==9.5.50"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
